<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента объявлений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e8e8ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .username {
            font-weight: 500;
            color: #1d1d1f;
        }

        .logout-link {
            color: #0066cc;
            text-decoration: none;
        }

        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .ad-card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        .ad-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.15);
        }

        .ad-image {
            width: 100%;
            height: 200px;
            background-color: #e8e8ed;
            overflow: hidden;
        }

        .ad-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .ad-card:hover .ad-image img {
            transform: scale(1.02);
        }

        .ad-content {
            padding: 1rem;
        }

        .ad-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1d1d1f;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ad-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1d1d1f;
        }

        .ad-price::before {
            content: '₽';
            margin-right: 0.125rem;
        }

        .loading-state, .error-state, .end-state {
            text-align: center;
            padding: 2rem 1.5rem;
            color: #8e8e93;
        }

        .spinner {
            width: 32px;
            height: 32px;
            margin: 0 auto 0.75rem;
            border: 2px solid #e8e8ed;
            border-top-color: #0066cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state button {
            margin-top: 0.75rem;
            padding: 0.5rem 1.25rem;
            background: white;
            border: 1px solid #d1d1d6;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Объявления</h1>
            <div class="user-info">
                <span class="username" sec:authentication="name"></span>
                <a href="/perform_logout" class="logout-link">Выйти</a>
            </div>
        </div>

        <div class="ads-grid" id="adsGrid"></div>

        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Загрузка объявлений</p>
        </div>

        <div id="errorState" class="error-state hidden">
            <p>Не удалось загрузить объявления</p>
            <button onclick="retryLoad()">Повторить</button>
        </div>

        <div id="endState" class="end-state hidden">
            <p>Все объявления загружены</p>
        </div>
    </div>

    <script>
        let currentPage = 0;
        let isLoading = false;
        let hasMore = true;
        const pageSize = 9;

        const adsGrid = document.getElementById('adsGrid');
        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const endState = document.getElementById('endState');

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatPrice(price) {
            return price.toLocaleString('ru-RU');
        }

        function renderAd(ad) {
            return `
                <div class="ad-card" onclick="location.href='/ad/${ad.id}'">
                    <div class="ad-image">
                        <img src="${ad.imageUrl || 'https://picsum.photos/300/200?random=' + ad.id}" alt="${escapeHtml(ad.title)}" loading="lazy">
                    </div>
                    <div class="ad-content">
                        <div class="ad-title">${escapeHtml(ad.title)}</div>
                        <div class="ad-price">${formatPrice(ad.price)}</div>
                    </div>
                </div>
            `;
        }

        async function loadAds() {
            if (isLoading || !hasMore) return;
            
            isLoading = true;
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            
            try {
                const response = await fetch(`/api/ads?page=${currentPage}&size=${pageSize}`);
                
                if (!response.ok) throw new Error('Ошибка сети');
                
                const ads = await response.json();
                
                if (ads.length === 0) {
                    hasMore = false;
                    loadingState.classList.add('hidden');
                    endState.classList.remove('hidden');
                    return;
                }
                
                ads.forEach(ad => {
                    adsGrid.insertAdjacentHTML('beforeend', renderAd(ad));
                });
                
                currentPage++;
                hasMore = ads.length === pageSize;
                
                if (!hasMore) {
                    loadingState.classList.add('hidden');
                    endState.classList.remove('hidden');
                }
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
            } finally {
                isLoading = false;
            }
        }

        function retryLoad() {
            errorState.classList.add('hidden');
            loadAds();
        }

        function handleScroll() {
            const scrollPosition = window.innerHeight + window.scrollY;
            const threshold = document.body.scrollHeight - 400;
            
            if (scrollPosition >= threshold && !isLoading && hasMore) {
                loadAds();
            }
        }
        
        window.addEventListener('scroll', handleScroll);
        loadAds();
    </script>
</body>
</html>
